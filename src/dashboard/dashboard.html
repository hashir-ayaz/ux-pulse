<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UX Pulse — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <h1>UX Pulse</h1>
        <span class="topbar-subtitle">Session Dashboard</span>
      </div>
      <div class="topbar-actions">
        <button id="btn-export-all" class="btn btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export All CSV
        </button>
        <button id="btn-clear-all" class="btn btn-danger-sm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          Clear All
        </button>
      </div>
    </header>

    <!-- Search / Filter -->
    <div class="filter-bar">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search by email or task name...">
      </div>
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="completed">Completed</button>
        <button class="chip" data-filter="abandoned">Abandoned</button>
      </div>
    </div>

    <!-- Sessions Table -->
    <div class="table-container">
      <table class="sessions-table" id="sessions-table">
        <thead>
          <tr>
            <th>Participant</th>
            <th>Task #</th>
            <th>Task</th>
            <th>Status</th>
            <th>Duration</th>
            <th>Events</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="sessions-tbody"></tbody>
      </table>

      <div id="empty-state" class="empty-state" style="display: none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <p>No sessions recorded yet</p>
        <span>Start a recording from the extension popup</span>
      </div>
    </div>

    <!-- Event Log Panel -->
    <div id="event-panel" class="event-panel" style="display: none;">
      <div class="event-panel-header">
        <h2 id="panel-title">Event Log</h2>
        <div class="event-panel-actions">
          <button id="btn-export-session" class="btn btn-outline btn-sm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Export CSV
          </button>
          <button id="btn-close-panel" class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- Panel Tabs -->
      <div class="panel-tabs">
        <button class="panel-tab active" data-tab="events">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          Events
        </button>
        <button class="panel-tab" data-tab="screenshots">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          Screenshots
          <span class="tab-count" id="screenshot-count">0</span>
        </button>
      </div>

      <!-- Events Tab -->
      <div class="tab-content active" id="tab-events">
        <div class="event-log-wrapper">
          <table class="event-log-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Type</th>
                <th>Time</th>
                <th>URL</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody id="event-log-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Screenshots Tab -->
      <div class="tab-content" id="tab-screenshots">
        <div id="screenshots-empty" class="screenshots-empty">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>No screenshots captured</p>
        </div>
        <div class="screenshot-grid" id="screenshot-grid"></div>
      </div>
    </div>

    <!-- Screenshot Lightbox -->
    <div id="lightbox" class="lightbox" style="display: none;">
      <div class="lightbox-backdrop"></div>
      <div class="lightbox-content">
        <div class="lightbox-header">
          <div class="lightbox-info">
            <span class="lightbox-trigger" id="lightbox-trigger"></span>
            <span class="lightbox-time" id="lightbox-time"></span>
          </div>
          <div class="lightbox-nav">
            <button id="lightbox-prev" class="btn-icon" title="Previous">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
            <span class="lightbox-counter" id="lightbox-counter">1 / 1</span>
            <button id="lightbox-next" class="btn-icon" title="Next">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>
            <button id="lightbox-close" class="btn-icon" title="Close" style="margin-left: 12px;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Screenshot">
      </div>
    </div>

    <!-- Confirm Modal -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div class="modal">
        <h3 id="modal-title">Confirm</h3>
        <p id="modal-message">Are you sure?</p>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-outline btn-sm">Cancel</button>
          <button id="modal-confirm" class="btn btn-danger-sm">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
