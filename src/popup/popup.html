<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UX Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Screen 1: Setup ─────────────────────────────── -->
  <div id="screen-setup" class="screen active">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <h1>UX Pulse</h1>
      </div>
      <span class="badge">Ready</span>
    </header>

    <div class="content">
      <div class="form-group">
        <label for="email-input">Participant Email</label>
        <input type="email" id="email-input" placeholder="user@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="task-input">Task Name</label>
        <input type="text" id="task-input" placeholder="e.g. Register on website">
      </div>

      <div class="form-group">
        <label for="task-desc">Description <span class="optional">(optional)</span></label>
        <textarea id="task-desc" rows="2" placeholder="What should the user accomplish?"></textarea>
      </div>

      <button id="btn-start" class="btn btn-accent" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
        Start Recording
      </button>
    </div>

    <footer class="footer">
      <a href="#" id="link-dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
        View Past Sessions
      </a>
    </footer>
  </div>

  <!-- ── Screen 2: Recording ─────────────────────────── -->
  <div id="screen-recording" class="screen">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <h1>UX Pulse</h1>
      </div>
      <span class="badge recording">
        <span class="pulse-dot"></span>
        Recording
      </span>
    </header>

    <div class="content">
      <div class="session-info">
        <div class="info-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span id="rec-email" class="info-value">user@test.com</span>
        </div>
        <div class="info-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          <span id="rec-task" class="info-value">Task Name</span>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-value mono" id="rec-timer">00:00</span>
          <span class="stat-label">Duration</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value mono" id="rec-events">0</span>
          <span class="stat-label">Events</span>
        </div>
      </div>

      <div class="action-buttons">
        <button id="btn-complete" class="btn btn-success">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Complete
        </button>
        <button id="btn-abandon" class="btn btn-danger-outline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Abandon
        </button>
      </div>
    </div>
  </div>

  <!-- ── Screen 3: Summary ───────────────────────────── -->
  <div id="screen-summary" class="screen">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <h1>UX Pulse</h1>
      </div>
      <span class="badge" id="summary-badge">Completed</span>
    </header>

    <div class="content">
      <div class="summary-header">
        <h2 id="summary-task">Task Name</h2>
        <div class="summary-meta">
          <span class="mono" id="summary-duration">00:00</span>
          <span class="dot-sep"></span>
          <span id="summary-event-count">0 events</span>
        </div>
      </div>

      <div class="event-breakdown" id="event-breakdown">
        <!-- Filled dynamically -->
      </div>

      <button id="btn-download" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download CSV
      </button>

      <div class="summary-actions">
        <a href="#" id="link-new-session">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Session
        </a>
        <a href="#" id="link-dashboard-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          All Sessions
        </a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
